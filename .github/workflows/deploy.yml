name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 部署到 GitHub Pages 所需的權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時間只跑一個部署,新的會取消進行中的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # vite build + 程式碼混淆(見 scripts/obfuscate.mjs)
      - run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
